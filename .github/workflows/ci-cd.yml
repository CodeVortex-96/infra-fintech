name: Fintech Enterprise CI/CD Pipeline

# GATILHO: Dispara a esteira toda vez que houver um 'push' na branch principal
on:
  push:
    branches: [ main, master ]

jobs:
  # ==========================================
  # ESTÁGIO 1: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  lint-and-test:
    name: 🛡️ Code Quality & Syntax Verification
    runs-on: ubuntu-latest 
    
    steps:
      - name: Check out do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validar Sintaxe do Código (Anti-Bug de Indentação)
        run: |
          pip install flake8
          flake8 app/src/main.py --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # ESTÁGIO 2: DEPLOY CONTÍNUO (CD)
  # ==========================================
  deploy-local-cluster:
    name: ☸️ Automated Deployment (Minikube)
    needs: lint-and-test 
    runs-on: self-hosted 

    steps:
      - name: Check out do código
        uses: actions/checkout@v3

      - name: Buildar e Atualizar no Kubernetes Local
        run: |
          # Força o Minikube a gerar sintaxe Bash
          eval $(minikube -p minikube docker-env --shell bash)

          # Builda a imagem
          cd app
          docker build -t fintech-app:${{ github.sha }} .

          # Aplica os manifestos
          cd ../k8s
          kubectl apply -f secret.yaml
          kubectl apply -f postgres.yaml
          kubectl apply -f service.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f ingress.yaml
          
          # 🚀 CORREÇÃO APLICADA: Nome do deployment ajustado para fintech-api-deployment
          kubectl set image deployment/fintech-api-deployment fintech-app=fintech-app:${{ github.sha }}
          
          # Garante que o rollout espere o sucesso
          kubectl rollout status deployment/fintech-api-deployment --timeout=60s
