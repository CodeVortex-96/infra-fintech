name: Fintech Enterprise CI/CD Pipeline

# GATILHO: Dispara a esteira toda vez que houver um 'push' na branch principal
on:
  push:
    branches: [ main, master ]

jobs:
  # ==========================================
  # ESTÁGIO 1: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  lint-and-test:
    name: 🛡️ Code Quality & Syntax Verification
    runs-on: ubuntu-latest # Roda isolado na nuvem do GitHub (não consome seu Arch)
    
    steps:
      - name: Check out do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Memoriza dependências para os próximos builds serem instantâneos

      - name: Validar Sintaxe do Código (Anti-Bug de Indentação)
        run: |
          pip install flake8
          # Se houver erro de indentação ou sintaxe, o build quebra aqui e protege o cluster
          flake8 app/src/main.py --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # ESTÁGIO 2: DEPLOY CONTÍNUO (CD)
  # ==========================================
  deploy-local-cluster:
    name: ☸️ Automated Deployment (Minikube)
    needs: lint-and-test # CRÍTICO: Só inicia se o estágio anterior (CI) ficar verde!
    runs-on: self-hosted # Acorda o seu robô local do Arch Linux

    steps:
      - name: Check out do código
        uses: actions/checkout@v3

      - name: Buildar e Atualizar no Kubernetes Local
        run: |
          # ⚠️ CORREÇÃO DO FISH: Força o Minikube a gerar sintaxe Bash pro Runner ler sem erro
          eval $(minikube -p minikube docker-env --shell bash)

          # 2. Builda a imagem usando o Hash do Commit como Tag única (evita cache velho)
          cd app
          docker build -t fintech-app:${{ github.sha }} .

          # 3. Aplica os manifestos no cluster de forma sequencial
          cd ../k8s
          kubectl apply -f secret.yaml
          kubectl apply -f postgres.yaml
          kubectl apply -f service.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f ingress.yaml
          
          # 4. Atualiza a imagem do container em tempo de execução de forma elegante
          kubectl set image deployment/fintech-app-deployment fintech-app=fintech-app:${{ github.sha }}
          
          # Garante que o Kubernetes vai esperar os pods subirem com sucesso antes de encerrar
          kubectl rollout status deployment/fintech-app-deployment --timeout=60s
