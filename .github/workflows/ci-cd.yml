name: Fintech Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # ==========================================
  # STAGE 1: INTEGRAÇÃO CONTÍNUA (CI)
  # ==========================================
  lint-and-test:
    name: 🛡️ Code Quality & Syntax Verification
    runs-on: ubuntu-latest # Isolado na nuvem, não consome seu Arch
    steps:
      - name: Check out do código
        uses: actions/checkout@v3

      - name: Configurar Ambiente Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # Sênior: Memoriza dependências para rodar mais rápido

      - name: Instalar Linter
        run: pip install flake8

      - name: Executar Análise Estática (Anti-Bug)
        run: |
          flake8 app/src/main.py --count --select=E9,F63,F7,F82 --show-source --statistics

  # ==========================================
  # STAGE 2: DEPLOY CONTÍNUO (CD)
  # ==========================================
  deploy-local-cluster:
    name: ☸️ Automated Deployment (Minikube)
    needs: lint-and-test # CRÍTICO: Só inicia se o estágio anterior ficar verde!
    runs-on: self-hosted # Acorda o seu robô local do Arch Linux
    
    steps:
      - name: Check out do código
        uses: actions/checkout@v3

      - name: Configurar Ambiente do Docker no Minikube
        run: |
          eval $(minikube -p minikube docker-env)

      - name: Buildar Imagem com Tag de Release
        run: |
          cd app
          docker build -t fintech-app:${{ github.sha }} .

      - name: Injetar Imagem Dinamicamente no Kubernetes
        run: |
          # Sênior: Não altera o arquivo yaml físico! Usa o kubectl para atualizar a imagem 
          # em memória no cluster ou criar um override limpo.
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/ingress.yaml
          
          # Atualiza a imagem do container em tempo de execução de forma elegante
          kubectl set image deployment/fintech-app-deployment fintech-app=fintech-app:${{ github.sha }}
          
          # Garante que o Kubernetes vai esperar o deploy estabilizar
          kubectl rollout status deployment/fintech-app-deployment --timeout=60s
